<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bergen voor pet</title>
<!--
  ============================================================
  Bergen voor pet — één bestand, alleen scrollen.

  De beroemdste bergen ter wereld verschijnen automatisch met hun
  naam, land en hoogte. Mont Blanc staat bovenaan (daar heeft pet op
  de top gestaan). De lijst wordt live opgehaald uit Wikidata en daarna
  op dit toestel bewaard, zodat de pagina de volgende keer meteen laadt.

  Geen knoppen, geen links: er kan niets per ongeluk worden aangeklikt
  of verwijderd. Alleen scrollen.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #16202B;      /* dusk-blue mountain sky */
    --snow:  #F3F1EC;      /* snowfield white */
    --mist:  #9FAAB8;      /* soft caption grey-blue */
    --glow:  #D9A66C;      /* faint alpenglow, used once */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--night);
    color: var(--snow);
    font-family: "Source Sans 3", sans-serif;
    /* Nothing on this page can be selected, dragged, or long-pressed */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior-y: none;
  }

  header {
    text-align: center;
    padding: 12vh 24px 9vh;
  }
  header .rule {
    width: 56px; height: 2px;
    background: var(--glow);
    margin: 0 auto 28px;
  }
  h1 {
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    letter-spacing: 0.01em;
  }
  header p {
    margin-top: 14px;
    color: var(--mist);
    font-size: clamp(1.05rem, 2.5vw, 1.25rem);
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 16px 10vh;
  }
  figure {
    margin: 0 0 9vh;
  }
  img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 6px;
    background: #0E141C;
    /* Taps on photos do absolutely nothing */
    pointer-events: none;
  }
  figcaption {
    font-family: "Fraunces", serif;
    font-size: clamp(1.1rem, 3vw, 1.35rem);
    color: var(--mist);
    text-align: center;
    padding-top: 16px;
  }

  footer {
    text-align: center;
    color: var(--mist);
    font-family: "Fraunces", serif;
    font-size: 1.25rem;
    padding: 4vh 24px 14vh;
  }
  #teller {
    margin-top: 18px;
    font-family: "Source Sans 3", sans-serif;
    font-size: 0.95rem;
    opacity: 0.75;
  }

  @media (prefers-reduced-motion: no-preference) {
    figure { opacity: 0; transform: translateY(14px); transition: opacity .9s ease, transform .9s ease; }
    figure.shown { opacity: 1; transform: none; }
  }
</style>
</head>
<body oncontextmenu="return false">

<header>
  <div class="rule"></div>
  <h1>Bergen voor pet</h1>
  <p>Met veel liefde, van heel je familie</p>
</header>

<main id="album"></main>

<footer>Tot op de top, en nog verder ⛰<div id="teller"></div></footer>

<script src="photos.js"></script>
<script>
/* ============================================================
   1) Mont Blanc staat altijd bovenaan, met de eigen woorden van
      de familie. Daarna de bergen uit photos.js (duizenden,
      automatisch opgebouwd), of anders de vaste lijst hieronder.
   ============================================================ */
const MONT_BLANC = {
  src: "https://commons.wikimedia.org/wiki/Special:FilePath/Mont%20Blanc%20100%200068.JPG?width=1400",
  caption: "Mont Blanc, Frankrijk/Italië — 4.806 m. Het dak van West-Europa. Hier heeft onze pet op de top gestaan!"
};

/* Vaste lijst: beroemde bergen, ingebakken in de pagina zelf.
   Alleen foto's die zeker bestaan. De volledige lijst (duizenden bergen)
   staat in photos.js en wordt automatisch opgebouwd en gecontroleerd door
   de GitHub-workflow (.github/workflows/bergen.yml). */
function cf(file) {
  return "https://commons.wikimedia.org/wiki/Special:FilePath/" +
         encodeURIComponent(file) + "?width=1400";
}
const FALLBACK = [
  MONT_BLANC,
  { src: cf("Massif du Mont-Blanc and river.jpg"), caption: "Het Mont Blanc-massief, gezien vanuit Val Ferret (Italië)" },
  { src: cf("Mont Blanc from Les Arcs 1950.jpg"), caption: "De Mont Blanc in 1950, gezien vanaf Les Arcs, Frankrijk" },
  { src: cf("Matterhorn reflection.jpg"), caption: "Matterhorn, Zwitserland — 4.478 m, weerspiegeld in de Riffelsee" },
  { src: cf("Zermatt and Matterhorn.jpg"), caption: "Zermatt aan de voet van de Matterhorn, Zwitserland" },
  { src: cf("Eiger,Mönch,Jungfrau2.JPG"), caption: "Eiger (3.967 m), Mönch (4.107 m) en Jungfrau (4.158 m), Zwitserland" },
  { src: cf("Mount Everest, Nepal, Himalayas.jpg"), caption: "Mount Everest, Nepal/Tibet — 8.849 m, de hoogste berg ter wereld" },
  { src: cf("Everest panorama from Kala Patthar.jpg"), caption: "Panorama van de Everest, gezien vanaf Kala Patthar, Nepal" },
  { src: cf("Lhotse-fromChukhungRi.jpg"), caption: "Lhotse, Nepal/Tibet — 8.516 m" },
  { src: cf("Ama Dablam from Kala Patthar.jpg"), caption: "Ama Dablam, Nepal — 6.812 m, 'de moeder met het halssieraad'" },
  { src: cf("K2 8611.jpg"), caption: "K2, Pakistan/China — 8.611 m, de op één na hoogste berg ter wereld" },
  { src: cf("Mount Kilimanjaro.jpg"), caption: "Kilimanjaro, Tanzania — 5.895 m, het dak van Afrika" },
  { src: cf("Lake Kawaguchiko Sakura Mount Fuji 4.JPG"), caption: "Mount Fuji, Japan — 3.776 m, met kersenbloesem aan het Kawaguchi-meer" },
  { src: cf("Baitou Mountain Tianchi.jpg"), caption: "Paektusan met het Hemelmeer, Noord-Korea/China — 2.744 m" },
  { src: cf("MSH82 st helens plume from harrys ridge 05-19-82.jpg"), caption: "Mount St. Helens, Verenigde Staten — 2.549 m, tijdens de uitbarsting van 1982" },
  { src: cf("Mount Hood reflected in Mirror Lake, Oregon.jpg"), caption: "Mount Hood, Verenigde Staten — 3.429 m" },
  { src: cf("Half Dome from Glacier Point, Yosemite NP - Diliff.jpg"), caption: "Half Dome, Yosemite, Verenigde Staten — 2.694 m" },
  { src: cf("Tunnel View, Yosemite Valley, Yosemite NP - Diliff.jpg"), caption: "Yosemite-vallei met El Capitan, Verenigde Staten" },
  { src: cf("Cuernos del Paine from Lake Pehoé.jpg"), caption: "Cuernos del Paine, Chili — Torres del Paine, Patagonië" },
  { src: cf("Table Mountain DanieVDM.jpg"), caption: "Tafelberg, Zuid-Afrika — 1.085 m" },
  { src: cf("Vesuvius from Pompeii (hires version 2 scaled).png"), caption: "Vesuvius, Italië — 1.281 m, gezien vanuit Pompeï" },
  { src: cf("Drei Zinnen Tre Cime di Lavaredo Dolomites.jpg"), caption: "Tre Cime di Lavaredo, Dolomieten, Italië — 2.999 m" },
  { src: cf("Via Lattea e Tre Cime di Lavaredo Panorama.jpg"), caption: "De Melkweg boven de Tre Cime di Lavaredo, Italië" },
];

/* ============================================================
   2) Tekenen van de galerij. Wordt opnieuw aangeroepen zodra de
      volledige lijst binnen is; oude foto's worden dan vervangen.
   ============================================================ */
const album = document.getElementById("album");
let observer = null;

/* 4806 -> "4.806" (Nederlandse duizendtallen met een punt) */
function nlHeight(m) {
  return String(Math.round(m)).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function render(list) {
  if (observer) observer.disconnect();
  album.textContent = "";
  let getoond = list.length;
  const teller = document.getElementById("teller");
  const zetTeller = () => { teller.textContent = nlHeight(getoond) + " bergen"; };

  for (const photo of list) {
    const fig = document.createElement("figure");
    const img = document.createElement("img");
    img.src = photo.src;
    img.alt = photo.caption || "Berg";
    img.loading = "lazy";        // foto's laden pas bij het scrollen — honderden blijven snel
    img.draggable = false;
    // kapotte foto's stilletjes weglaten én de teller bijwerken
    img.addEventListener("error", () => { fig.remove(); getoond--; zetTeller(); });
    fig.appendChild(img);
    if (photo.caption) {
      const cap = document.createElement("figcaption");
      cap.textContent = photo.caption;
      fig.appendChild(cap);
    }
    album.appendChild(fig);
  }

  observer = new IntersectionObserver(entries => {
    for (const e of entries) if (e.isIntersecting) e.target.classList.add("shown");
  }, { rootMargin: "80px" });
  document.querySelectorAll("figure").forEach(f => observer.observe(f));

  /* Klein tellertje onderaan: zo zie je hoeveel bergen er geladen zijn. */
  zetTeller();
}

/* ============================================================
   3) De volledige lijst komt uit photos.js (aangemaakt en foto voor
      foto gecontroleerd door de GitHub-workflow). Ontbreekt dat
      bestand nog, dan toont de pagina de vaste lijst hierboven.
   ============================================================ */
const lijst = (window.PHOTOS && window.PHOTOS.length > 0) ? window.PHOTOS : FALLBACK;
render(lijst);
</script>
</body>
</html>
