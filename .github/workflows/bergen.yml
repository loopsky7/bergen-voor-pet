name: Bergenlijst bouwen

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/bergen.yml"
      - "index.html"
  schedule:
    - cron: "17 4 1 * *"   # elke maand verversen

permissions:
  contents: write

jobs:
  bouwen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bergen ophalen uit Wikidata en elke foto controleren
        run: |
          python3 - <<'PY'
          import json, sys, urllib.request, urllib.parse
          from concurrent.futures import ThreadPoolExecutor

          UA = {"User-Agent": "bergen-voor-pet/1.0 (https://github.com/loopsky7/bergen-voor-pet)",
                "Accept": "application/sparql-results+json"}

          MONT_BLANC = {
              "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Mont%20Blanc%20100%200068.JPG?width=1400",
              "caption": "Mont Blanc, Frankrijk/Italië — 4.806 m. Het dak van West-Europa. Hier heeft onze pet op de top gestaan!",
          }

          def sparql(classes, min_fame, limit):
              return f"""
          SELECT ?m ?mLabel ?elevation ?image ?fame ?countryLabel WHERE {{
            {{
              SELECT ?m ?fame (MAX(?elev) AS ?elevation)
                     (SAMPLE(?img) AS ?image) (SAMPLE(?c) AS ?country) WHERE {{
                VALUES ?class {{ {classes} }}
                ?m wdt:P31 ?class .
                ?m wikibase:sitelinks ?fame .
                FILTER(?fame >= {min_fame})
                ?m wdt:P2044 ?elev .
                ?m wdt:P18   ?img .
                OPTIONAL {{ ?m wdt:P17 ?c . }}
              }}
              GROUP BY ?m ?fame
              ORDER BY DESC(?fame)
              LIMIT {limit}
            }}
            SERVICE wikibase:label {{ bd:serviceParam wikibase:language "nl,en". }}
          }}
          ORDER BY DESC(?fame)"""

          TIERS = [("wd:Q8502 wd:Q8072 wd:Q169358", 4, 3000),
                   ("wd:Q8502 wd:Q8072", 10, 1200),
                   ("wd:Q8502", 25, 400)]

          def query(q):
              url = "https://query.wikidata.org/sparql?format=json&query=" + urllib.parse.quote(q)
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=120) as r:
                  return json.load(r)["results"]["bindings"]

          rows = []
          for classes, fame, limit in TIERS:
              try:
                  rows = query(sparql(classes, fame, limit))
                  print(f"Wikidata gaf {len(rows)} rijen (limit {limit})")
                  if len(rows) > 100:
                      break
              except Exception as e:
                  print(f"poging (limit {limit}) mislukt: {e}", file=sys.stderr)

          def nl(n):
              return f"{n:,}".replace(",", ".")

          entries, seen = [], {"mont blanc"}
          for b in rows:
              name = b.get("mLabel", {}).get("value", "").strip()
              if not name or (name.startswith("Q") and name[1:].isdigit()):
                  continue
              key = name.lower()
              if key in seen or "mont blanc" in key:
                  continue
              try:
                  elev = round(float(b["elevation"]["value"]))
              except Exception:
                  continue
              if not (100 <= elev <= 9000):
                  continue
              img = b.get("image", {}).get("value")
              if not img:
                  continue
              country = b.get("countryLabel", {}).get("value", "").strip()
              if country.startswith("Q") and country[1:].isdigit():
                  country = ""
              src = img.replace("http://", "https://", 1)
              src += ("&" if "?" in src else "?") + "width=1400"
              cap = f"{name}, {country} — {nl(elev)} m" if country else f"{name} — {nl(elev)} m"
              entries.append({"src": src, "caption": cap})
              seen.add(key)

          print(f"{len(entries)} bergen na filteren; foto's controleren …")

          def check(e):
              try:
                  req = urllib.request.Request(e["src"], headers={"User-Agent": UA["User-Agent"]}, method="HEAD")
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return e if r.status == 200 else None
              except Exception:
                  return None

          with ThreadPoolExecutor(max_workers=12) as ex:
              checked = [e for e in ex.map(check, entries) if e]

          print(f"{len(checked)} foto's bestaan echt ({len(entries) - len(checked)} afgekeurd)")

          photos = [MONT_BLANC] + checked
          if len(photos) < 100:
              print("Te weinig bergen; photos.js blijft ongewijzigd.", file=sys.stderr)
              sys.exit(0)

          with open("photos.js", "w", encoding="utf-8") as f:
              f.write("/* Automatisch opgebouwd door .github/workflows/bergen.yml — niet met de hand bewerken. */\n")
              f.write("window.PHOTOS = ")
              json.dump(photos, f, ensure_ascii=False, indent=1)
              f.write(";\n")
          print(f"photos.js geschreven met {len(photos)} bergen.")
          PY

      - name: photos.js vastleggen
        run: |
          git config user.name "bergen-bot"
          git config user.email "actions@users.noreply.github.com"
          git add photos.js
          git diff --cached --quiet || (git commit -m "Bergenlijst bijgewerkt" && git push)
