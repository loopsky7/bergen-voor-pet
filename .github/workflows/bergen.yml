name: Bergenlijst bouwen

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/bergen.yml"
      - "index.html"
  schedule:
    - cron: "17 4 1 * *"   # elke maand verversen

permissions:
  contents: write

jobs:
  bouwen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bergen ophalen uit Wikidata en elke foto controleren
        run: |
          python3 - <<'PY'
          import json, sys, time, traceback, urllib.request, urllib.parse, urllib.error
          from concurrent.futures import ThreadPoolExecutor

          LOG = []
          def log(msg):
              line = time.strftime("%H:%M:%S ") + str(msg)
              print(line, flush=True)
              LOG.append(line)

          UA = {"User-Agent": "bergen-voor-pet/1.0 (https://github.com/loopsky7/bergen-voor-pet; contact via repo)",
                "Accept": "application/sparql-results+json"}

          MONT_BLANC = {
              "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Mont%20Blanc%20100%200068.JPG?width=1400",
              "caption": "Mont Blanc, Frankrijk/Italië — 4.806 m. Het dak van West-Europa. Hier heeft onze pet op de top gestaan!",
          }

          def sparql(classes, min_fame, limit):
              return f"""
          SELECT ?m ?mLabel ?elevation ?image ?fame ?countryLabel WHERE {{
            {{
              SELECT ?m ?fame (MAX(?elev) AS ?elevation)
                     (SAMPLE(?img) AS ?image) (SAMPLE(?c) AS ?country) WHERE {{
                VALUES ?class {{ {classes} }}
                ?m wdt:P31 ?class .
                ?m wikibase:sitelinks ?fame .
                FILTER(?fame >= {min_fame})
                ?m wdt:P2044 ?elev .
                ?m wdt:P18   ?img .
                OPTIONAL {{ ?m wdt:P17 ?c . }}
              }}
              GROUP BY ?m ?fame
              ORDER BY DESC(?fame)
              LIMIT {limit}
            }}
            SERVICE wikibase:label {{ bd:serviceParam wikibase:language "nl,en". }}
          }}
          ORDER BY DESC(?fame)"""

          TIERS = [("wd:Q8502 wd:Q8072 wd:Q169358", 4, 3000),
                   ("wd:Q8502 wd:Q8072", 10, 1200),
                   ("wd:Q8502", 25, 400)]

          def query(q):
              data = urllib.parse.urlencode({"format": "json", "query": q}).encode()
              req = urllib.request.Request("https://query.wikidata.org/sparql",
                                           data=data, headers=UA, method="POST")
              with urllib.request.urlopen(req, timeout=180) as r:
                  return json.load(r)["results"]["bindings"]

          def main():
              rows = []
              for classes, fame, limit in TIERS:
                  try:
                      log(f"Wikidata bevragen (limit {limit}, fame>={fame}) ...")
                      rows = query(sparql(classes, fame, limit))
                      log(f"Wikidata gaf {len(rows)} rijen")
                      if len(rows) > 100:
                          break
                  except urllib.error.HTTPError as e:
                      body = ""
                      try: body = e.read()[:500].decode("utf-8", "replace")
                      except Exception: pass
                      log(f"poging (limit {limit}) HTTP {e.code}: {e.reason} | {body}")
                  except Exception as e:
                      log(f"poging (limit {limit}) mislukt: {type(e).__name__}: {e}")
                  time.sleep(5)

              def nl(n):
                  return f"{n:,}".replace(",", ".")

              entries, seen = [], {"mont blanc"}
              for b in rows:
                  name = b.get("mLabel", {}).get("value", "").strip()
                  if not name or (name.startswith("Q") and name[1:].isdigit()):
                      continue
                  key = name.lower()
                  if key in seen or "mont blanc" in key:
                      continue
                  try:
                      elev = round(float(b["elevation"]["value"]))
                  except Exception:
                      continue
                  if not (100 <= elev <= 9000):
                      continue
                  img = b.get("image", {}).get("value")
                  if not img:
                      continue
                  country = b.get("countryLabel", {}).get("value", "").strip()
                  if country.startswith("Q") and country[1:].isdigit():
                      country = ""
                  src = img.replace("http://", "https://", 1)
                  src += ("&" if "?" in src else "?") + "width=1400"
                  cap = f"{name}, {country} — {nl(elev)} m" if country else f"{name} — {nl(elev)} m"
                  entries.append({"src": src, "caption": cap})
                  seen.add(key)

              log(f"{len(entries)} bergen na filteren; foto's controleren ...")

              def check(e):
                  try:
                      req = urllib.request.Request(e["src"], headers={"User-Agent": UA["User-Agent"]}, method="HEAD")
                      with urllib.request.urlopen(req, timeout=25) as r:
                          return e if r.status == 200 else None
                  except Exception:
                      return None

              checked = []
              if entries:
                  with ThreadPoolExecutor(max_workers=12) as ex:
                      checked = [e for e in ex.map(check, entries) if e]
              log(f"{len(checked)} foto's bestaan echt ({len(entries) - len(checked)} afgekeurd)")

              photos = [MONT_BLANC] + checked
              if len(photos) < 100:
                  log(f"Slechts {len(photos)} bergen — photos.js wordt NIET geschreven.")
                  return

              with open("photos.js", "w", encoding="utf-8") as f:
                  f.write("/* Automatisch opgebouwd door .github/workflows/bergen.yml — niet met de hand bewerken. */\n")
                  f.write("window.PHOTOS = ")
                  json.dump(photos, f, ensure_ascii=False, indent=1)
                  f.write(";\n")
              log(f"photos.js geschreven met {len(photos)} bergen.")

          try:
              main()
          except Exception:
              log("ONVERWACHTE FOUT:\n" + traceback.format_exc())

          with open("bouwlog.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(LOG) + "\n")
          PY

      - name: Resultaat vastleggen
        if: always()
        run: |
          git config user.name "bergen-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f photos.js ]; then git add photos.js; fi
          if [ -f bouwlog.txt ]; then git add bouwlog.txt; fi
          if ! git diff --cached --quiet; then
            git commit -m "Bergenlijst bijgewerkt"
            git push
          fi
